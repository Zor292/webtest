<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Urban Threads</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">Urban Threads</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/shop">Shop</a></li>
        <li><a href="/cart">Cart (<span id="cart-count">0</span>)</a></li>
        <li id="auth-links"><a href="/login">Login</a> | <a href="/register">Register</a></li>
        <li id="user-menu" style="display:none">
          <a href="#" id="user-name-link"></a>
          <a href="/admin" id="admin-link" style="display:none">Admin</a>
          <a href="#" id="logout-btn">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <section class="checkout-page">
    <div class="container">
      <h1>Checkout</h1>
      <div id="checkout-content">
        <div class="checkout-form">
          <h2>Shipping Details</h2>
          <form id="checkout-form">
            <div class="form-group">
              <label for="address">Address</label>
              <input type="text" id="address" required>
            </div>
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" required>
            </div>
            <div class="form-group">
              <label for="zip">ZIP Code</label>
              <input type="text" id="zip" required>
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" required>
            </div>
            <button type="submit" class="btn btn-primary">Place Order</button>
          </form>
        </div>
        <div class="order-summary" id="order-summary">
          <h2>Order Summary</h2>
          <div id="summary-items"></div>
          <div class="summary-total">
            <strong>Total: $<span id="summary-total">0.00</span></strong>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Urban Threads. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    checkAuth();
    loadCheckout();
  </script>
</body>
</html>
