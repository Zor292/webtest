<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Urban Threads</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">Urban Threads</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/shop">Shop</a></li>
        <li><a href="/cart">Cart (<span id="cart-count">0</span>)</a></li>
        <li id="auth-links"><a href="/login">Login</a> | <a href="/register">Register</a></li>
        <li id="user-menu" style="display:none">
          <a href="#" id="user-name-link"></a>
          <a href="/admin" id="admin-link" style="display:none">Admin</a>
          <a href="#" id="logout-btn">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <section class="shop-page">
    <div class="container">
      <h1>Shop All Products</h1>
      <div class="shop-controls">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search products...">
          <button id="search-btn">Search</button>
        </div>
        <div class="filters">
          <select id="category-filter">
            <option value="all">All Categories</option>
            <option value="men">Men</option>
            <option value="women">Women</option>
            <option value="kids">Kids</option>
            <option value="accessories">Accessories</option>
          </select>
          <select id="sort-filter">
            <option value="">Default</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="newest">Newest First</option>
          </select>
        </div>
      </div>
      <div class="product-grid" id="product-list"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Urban Threads. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    checkAuth();
    loadShopPage();
  </script>
</body>
</html>
