<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Urban Threads</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">Urban Threads</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/shop">Shop</a></li>
        <li><a href="/cart">Cart (<span id="cart-count">0</span>)</a></li>
        <li><a href="/login">Login</a> | <a href="/register">Register</a></li>
      </ul>
    </div>
  </nav>

  <section class="auth-page">
    <div class="container">
      <div class="auth-card">
        <h1>Register</h1>
        <form id="register-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6">
          </div>
          <p id="register-error" class="error-message"></p>
          <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>
        <p class="auth-link">Already have an account? <a href="/login">Login</a></p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Urban Threads. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/auth.js"></script>
</body>
</html>
