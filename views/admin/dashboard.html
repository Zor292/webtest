<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Urban Threads</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <ul>
        <li><a href="/admin" class="active">Dashboard</a></li>
        <li><a href="/admin/products">Products</a></li>
        <li><a href="/admin/orders">Orders</a></li>
        <li id="users-nav" style="display:none"><a href="/admin/users">Users</a></li>
        <li><a href="/">Back to Store</a></li>
        <li><a href="#" id="admin-logout">Logout</a></li>
      </ul>
    </aside>
    <main class="admin-content">
      <h1>Dashboard</h1>
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Products</h3>
          <p id="stat-products">0</p>
        </div>
        <div class="stat-card">
          <h3>Orders</h3>
          <p id="stat-orders">0</p>
        </div>
        <div class="stat-card">
          <h3>Users</h3>
          <p id="stat-users">0</p>
        </div>
        <div class="stat-card">
          <h3>Revenue</h3>
          <p id="stat-revenue">$0</p>
        </div>
      </div>
      <h2>Recent Orders</h2>
      <table class="admin-table" id="recent-orders">
        <thead>
          <tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
  <script>initAdmin('dashboard');</script>
</body>
</html>
