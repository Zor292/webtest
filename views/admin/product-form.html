<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Form - Urban Threads</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <ul>
        <li><a href="/admin">Dashboard</a></li>
        <li><a href="/admin/products" class="active">Products</a></li>
        <li><a href="/admin/orders">Orders</a></li>
        <li id="users-nav-form" style="display:none"><a href="/admin/users">Users</a></li>
        <li><a href="/">Back to Store</a></li>
        <li><a href="#" id="admin-logout">Logout</a></li>
      </ul>
    </aside>
    <main class="admin-content">
      <h1 id="form-title">Add Product</h1>
      <form id="product-form" class="admin-form">
        <input type="hidden" id="product-id">
        <div class="form-group">
          <label for="name">Product Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="4"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="stock">Stock</label>
            <input type="number" id="stock" required>
          </div>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="men">Men</option>
            <option value="women">Women</option>
            <option value="kids">Kids</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <div class="form-group">
          <label for="image">Image URL</label>
          <input type="text" id="image" placeholder="/images/placeholder.svg">
        </div>
        <div class="form-group">
          <label for="sizes">Sizes (comma separated)</label>
          <input type="text" id="sizes" placeholder="S, M, L, XL">
        </div>
        <div class="form-group">
          <label for="colors">Colors (comma separated)</label>
          <input type="text" id="colors" placeholder="Black, White, Blue">
        </div>
        <p id="form-error" class="error-message"></p>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Product</button>
          <a href="/admin/products" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
  <script>initAdmin('product-form');</script>
</body>
</html>
