<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products - Urban Threads</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <ul>
        <li><a href="/admin">Dashboard</a></li>
        <li><a href="/admin/products" class="active">Products</a></li>
        <li><a href="/admin/orders">Orders</a></li>
        <li id="users-nav-admin" style="display:none"><a href="/admin/users">Users</a></li>
        <li><a href="/">Back to Store</a></li>
        <li><a href="#" id="admin-logout">Logout</a></li>
      </ul>
    </aside>
    <main class="admin-content">
      <div class="admin-header">
        <h1>Products</h1>
        <a href="/admin/products/new" class="btn btn-primary">Add Product</a>
      </div>
      <table class="admin-table" id="products-table">
        <thead>
          <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
  <script>initAdmin('products');</script>
</body>
</html>
