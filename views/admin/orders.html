<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders - Urban Threads</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <ul>
        <li><a href="/admin">Dashboard</a></li>
        <li><a href="/admin/products">Products</a></li>
        <li><a href="/admin/orders" class="active">Orders</a></li>
        <li id="users-nav-orders" style="display:none"><a href="/admin/users">Users</a></li>
        <li><a href="/">Back to Store</a></li>
        <li><a href="#" id="admin-logout">Logout</a></li>
      </ul>
    </aside>
    <main class="admin-content">
      <div class="admin-header">
        <h1>Orders</h1>
        <select id="order-status-filter">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <table class="admin-table" id="orders-table">
        <thead>
          <tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
  <script>initAdmin('orders');</script>
</body>
</html>
